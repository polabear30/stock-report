name: 일일 시황 리포트

# 06:30 KST, 화~토만 (일·월 미실행). 금요일 미국장 마감 → 토요일 아침 반영.
# cron은 UTC라 21:30 UTC = KST 다음날 06:30 → UTC 월~금(1-5) = KST 화~토.
on:
  # 자동 스케줄은 GCP Cloud Scheduler로 이관됨(2026-06-26).
  # 중복 메일 방지를 위해 GitHub의 cron은 비활성화. 비상 시 수동 실행:
  # Actions 탭 → "일일 시황 리포트" → Run workflow.
  # schedule:
  #   - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # 수동 실행 버튼 (비상용 백업)

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 실행 방지
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  build-deploy-notify:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 리포트 생성
        run: python daily_report.py --out _site/index.html --status-out status.json

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: GitHub Pages 배포
        id: deploy
        uses: actions/deploy-pages@v4

      - name: 이메일로 리포트 링크 전송
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASSWORD" ]; then
            echo "::warning::SMTP 시크릿 미설정 — 이메일 발송을 건너뜁니다. (SETUP_AUTOMATION.md 이메일 설정 참고)"
            exit 0
          fi
          python -m notify.email_send \
            --url "${{ steps.deploy.outputs.page_url }}" \
            --status-file status.json
